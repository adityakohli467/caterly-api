name: Deploy Zenn API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Zenn API to EC2
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo (workflow context)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Deploy via SSH
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "📁 Moving to project directory"
            cd /home/ubuntu/zenn/zenn_api

            echo "🧹 Cleaning local repo"
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "📦 Installing dependencies"
            npm install

            echo "🏗️ Building NestJS API"
            npm run build

            echo "🚀 Restarting PM2 process"
            pm2 restart zenn-api --update-env || pm2 start dist/main.js --name zenn-api

            echo "💾 Saving PM2 state"
            pm2 save

            echo "✅ Zenn API deployment completed successfully"
